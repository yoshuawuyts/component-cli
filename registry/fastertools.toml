[namespace]
name = "fastertools"
registry = "ghcr.io/fastertools"

# fastertools/ftl-mcp - gateway components
[[component]]
name = "ftl-auth-gateway"
repository = "ftl-auth-gateway"

[[component]]
name = "ftl-mcp-gateway"
repository = "ftl-mcp-gateway"

# fastertools/ftl-tool-think
[[component]]
name = "ftl-tool-think"
repository = "ftl-tool-think"

