repository = "ftl-tool-encoding"

[[component]]
name = "ftl-tool-geospatial"
repository = "ftl-tool-geospatial"

[[component]]
name = "ftl-tool-identifiers"
repository = "ftl-tool-identifiers"

[[component]]
