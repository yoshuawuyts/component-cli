[namespace]
name = "greenticai"
registry = "ghcr.io/greenticai"

# greenticai/greentic-interfaces - WIT interfaces
[[interface]]
name = "greentic-component"
repository = "greentic-interfaces/wit/component"

[[interface]]
name = "greentic-host"
repository = "greentic-interfaces/wit/host"

[[interface]]
name = "greentic-lifecycle"
repository = "greentic-interfaces/wit/lifecycle"

# greenticai/component-templates
[[component]]
name = "component-templates"
repository = "components/templates"

# greenticai/greentic-mcp-adapter
[[component]]
name = "greentic-mcp-adapter"
repository = "greentic-mcp-adapter"

# greenticai/component-adaptive-card
[[component]]
name = "component-adaptive-card"
repository = "components/adaptive-card"

# greenticai/greentic-demo
[[component]]
name = "greentic-demo"
repository = "greentic-demo"

# greenticai/greentic-qa
[[component]]
name = "greentic-qa"
repository = "greentic-qa"

# greenticai/greentic-mcp
[[component]]
name = "greentic-mcp"
repository = "greentic-mcp"
